<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Noto+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Noto Sans', 'Cairo', sans-serif; background-color: #f8fafc; }
        .card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card:hover { transform: translateY(-4px); box-shadow: 0 12px 20px -5px rgba(0, 0, 0, 0.1); }
        .correct-answer { background-color: #dcfce7 !important; border-color: #22c55e !important; color: #15803d !important; }
        .wrong-answer { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #b91c1c !important; }
        .hidden-content { display: none; }
        .option-btn { transition: all 0.2s; }
        .option-btn:disabled { cursor: default; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="pb-12 bg-gray-50">
    <div class="max-w-3xl mx-auto px-4 py-8">
        <div class="bg-white rounded-2xl shadow-sm p-8 mb-8 text-center border-t-4 border-blue-600 relative overflow-hidden">
            <div class="absolute top-0 right-0 p-4 opacity-10"><i class="fas fa-user-md text-8xl text-blue-600"></i></div>
            
            <h1 class="text-3xl font-bold text-gray-800 mb-2 font-cairo text-center" dir="auto">Health Educator Fundamentals</h1>
            
            <div class="flex items-center justify-center gap-2 text-green-600 font-semibold bg-green-50 w-fit mx-auto px-4 py-1 rounded-full text-sm">
                <i class="fas fa-check-circle"></i> "تم صنع هذا الامتحان بواسطة عبدالحليم رزق"
            </div>
        </div>
        <div id="quiz-container"></div>
        <div id="result-summary" class="hidden-content bg-white rounded-2xl shadow-lg p-8 text-center mt-8 border border-gray-100">
            <h2 class="text-2xl font-bold text-gray-800">Exam Completed</h2>
            <div class="mt-4 text-4xl font-bold text-blue-600 mb-2">
                <span id="score-display">0</span> <span class="text-xl text-gray-400" id="total-display"></span>
            </div>
            <p id="score-message" class="text-gray-500 mb-6"></p>
            <button onclick="location.reload()" class="bg-blue-600 text-white px-8 py-3 rounded-xl hover:bg-blue-700 transition shadow-lg hover:shadow-blue-200">
                <i class="fas fa-redo mr-2"></i> Restart Exam
            </button>
        </div>
    </div>

    <script>
        // --- 1. QUESTIONS ARRAY (GENERATE 50 QUESTIONS HERE) ---
        const rawQuizData = [
            {
                id: 1,
                question: "According to the 1990 JCHET Report, what is the primary function of the health education field?",
                options: ["Manufacturing medical equipment", "Designing educational programs", "Enforcing hospital regulations", "Distributing pharmaceutical drugs"],
                correct: 1,
                rationale: "The JCHET report defines health education as a multidisciplinary practice concerned with designing, implementing, and evaluating educational programs."
            },
            {
                id: 2,
                question: "Which of the following is a key personal characteristic of an effective health educator regarding their lifestyle?",
                options: ["Concealing all habits", "Awareness of public scrutiny", "Ignoring personal health", "Avoiding social interactions"],
                correct: 1,
                rationale: "An effective health educator must be aware of their own lifestyle that could be opened to public scrutiny."
            },
            {
                id: 3,
                question: "What distinguishes today's state-of-the-art health education curricula from less effective ones?",
                options: ["Focus on scientific facts", "Emphasis on functional information", "Reliance on rote memorization", "Exclusion of social values"],
                correct: 1,
                rationale: "Effective curricula emphasize teaching functional health information rather than just scientific facts."
            },
            {
                id: 4,
                question: "True or False: A health educator may serve as a resource to assist individuals and administer fiscal resources for programs.",
                options: ["True", "False"],
                correct: 0,
                rationale: "The SOC definition states that a health educator may serve as a resource and administer fiscal resources for health education programs."
            },
            {
                id: 5,
                question: "Which theoretical approach is specifically mentioned as a foundation for effective instructional strategies?",
                options: ["Social cognitive theory", "Quantum field theory", "Classical economic theory", "Historical materialism"],
                correct: 0,
                rationale: "Instructional strategies build on theoretical approaches like social cognitive theory and social inoculation theory."
            },
            {
                id: 6,
                question: "What is a critical component of ethical commitment for a health educator regarding patient information?",
                options: ["Sharing data publicly", "Maintaining confidentiality", "Selling contact lists", "Discussing cases openly"],
                correct: 1,
                rationale: "Health educators must maintain confidentiality about patient information as part of their ethical commitment."
            },
            {
                id: 7,
                question: "Which term describes the ability to identify with the way another person feels while remaining objective?",
                options: ["Sympathy", "Empathy", "Apathy", "Telepathy"],
                correct: 1,
                rationale: "Empathy is defined as identifying with the way another person feels while remaining objective enough to help the patient."
            },
            {
                id: 8,
                question: "What is the primary goal of validation in the context of professional communication?",
                options: ["Proving the client wrong", "Ensuring mutual understanding", "Ignoring the client's view", "Asserting authority"],
                correct: 1,
                rationale: "Validation involves listening and responding congruently to ensure the nurse and client have the same understanding."
            },
            {
                id: 9,
                question: "True or False: Effective health curricula should avoid addressing social norms and peer pressure.",
                options: ["True", "False"],
                correct: 1,
                rationale: "Effective curricula must address social pressures, correct misperceptions of peer norms, and reinforce health-enhancing values."
            },
            {
                id: 10,
                question: "Which step is part of the developmental series for building essential skills in students?",
                options: ["Modeling the skill", "Ignoring the skill", "Criticizing the skill", "Hiding the skill"],
                correct: 0,
                rationale: "The developmental steps for skills include modeling, practicing, and providing feedback."
            },
            {
                id: 11,
                question: "What does the term 'Consistency' refer to in the personal characteristics of a health educator?",
                options: ["Living the curriculum", "Changing rules often", "Avoiding daily lessons", "Ignoring new information"],
                correct: 0,
                rationale: "Consistency is described as 'Live the curriculum'—seeing lessons every day in every new cast, newspaper, and decision."
            },
            {
                id: 12,
                question: "How should a health educator handle the cultural background of a patient?",
                options: ["Ignore core values", "Understand core values", "Impose own values", "Reject native customs"],
                correct: 1,
                rationale: "A competent educator should be culturally sensitive, understanding the patient's core values, beliefs, and customs."
            },
            {
                id: 13,
                question: "Which professional characteristic involves helping the patient achieve desired objectives?",
                options: ["Being competent", "Being disorganized", "Being indifferent", "Being passive"],
                correct: 0,
                rationale: "Competence includes effectively helping the patient to achieve the desired objectives."
            },
            {
                id: 14,
                question: "What is the definition of 'Caring' in the context of communication skills?",
                options: ["Physical distance", "Emotional involvement", "Professional detachment", "Social isolation"],
                correct: 1,
                rationale: "Caring is defined as the level of emotional involvement between the nurse/educator and the client."
            },
            {
                id: 15,
                question: "True or False: Active listening involves only hearing what the client is saying verbally.",
                options: ["True", "False"],
                correct: 1,
                rationale: "Active listening involves both hearing and interpreting language, including what is said verbally and nonverbally."
            },
            {
                id: 16,
                question: "Which instructional strategy helps students personalize information and maintain interest?",
                options: ["Lecture only", "Role playing", "Silent reading", "Rote copying"],
                correct: 1,
                rationale: "Interactive strategies like role playing and problem solving help students personalize information and maintain interest."
            },
            {
                id: 17,
                question: "What should a health educator do regarding the patient's right to make decisions?",
                options: ["Make decisions for them", "Support informed decisions", "Ignore their preferences", "Force specific choices"],
                correct: 1,
                rationale: "Ethical commitment involves supporting the right of individuals to make informed decisions regarding their own health."
            },
            {
                id: 18,
                question: "Which of the following is a personal characteristic related to time management?",
                options: ["Punctual", "Flexible", "Honest", "Patient"],
                correct: 0,
                rationale: "Being punctual and perceiving the value of time is listed as a personal characteristic."
            },
            {
                id: 19,
                question: "What is the role of 'Silence' in good communication skills?",
                options: ["It indicates confusion", "It is a valid technique", "It shows lack of knowledge", "It should be avoided"],
                correct: 1,
                rationale: "Using silence is listed as a component of good communication skills."
            },
            {
                id: 20,
                question: "How should a health educator deliver content to ensure clarity?",
                options: ["Use complex jargon", "Use simple pictures", "Speak very quickly", "Use abstract theories"],
                correct: 1,
                rationale: "Communication skills include keeping content clear and using simple pictures or models."
            },
            {
                id: 21,
                question: "True or False: Less effective curricula often overemphasize teaching scientific facts.",
                options: ["True", "False"],
                correct: 0,
                rationale: "The text states that less effective curricula often overemphasize teaching scientific facts and increasing student knowledge."
            },
            {
                id: 22,
                question: "Which skill allows students to deal with social pressures and avoid risk behaviors?",
                options: ["Refusal skills", "Passive acceptance", "Ignoring risks", "Blind obedience"],
                correct: 0,
                rationale: "Curricula build essential skills including refusal skills to enable students to deal with social pressures."
            },
            {
                id: 23,
                question: "What is required for a health educator to be considered 'Skillful'?",
                options: ["Mastering the content", "Owning a clinic", "Writing a textbook", "Travel experience"],
                correct: 0,
                rationale: "A skillful educator should be mastering the content and mastering the skills while demonstrating procedures."
            },
            {
                id: 24,
                question: "Which action demonstrates cultural sensitivity in material development?",
                options: ["Using only English", "Using native languages", "Using technical Latin", "Using slang terms"],
                correct: 1,
                rationale: "Developing material in the patient's native languages is a sign of cultural sensitivity."
            },
            {
                id: 25,
                question: "What is the purpose of providing feedback during skill development?",
                options: ["To discourage students", "To reinforcement learning", "To confuse the learner", "To delay the process"],
                correct: 1,
                rationale: "Providing feedback and reinforcement is a step in guiding students through skill development."
            },
            {
                id: 26,
                question: "True or False: A health educator should be emotionally stable and not easily upset.",
                options: ["True", "False"],
                correct: 0,
                rationale: "Personal characteristics include being emotionally stable and having self-control (not easily upset)."
            },
            {
                id: 27,
                question: "Which communication technique involves varying the tone of voice?",
                options: ["Monotone delivery", "Auditory engagement", "Silent treatment", "Rapid speech"],
                correct: 1,
                rationale: "Varying the tone of voice is listed as a good communication skill."
            },
            {
                id: 28,
                question: "What should effective curricula provide regarding time allocation?",
                options: ["Minimal instruction time", "Adequate practice time", "Rushed content delivery", "Zero review time"],
                correct: 1,
                rationale: "Effective curricula provide adequate time to promote understanding of key health concepts and practice skills."
            },
            {
                id: 29,
                question: "Which personal trait involves being motivated and energized?",
                options: ["Knowing oneself", "Being flexible", "Being punctual", "Being honest"],
                correct: 0,
                rationale: "Knowing oneself is associated with being motivated and energized in the personal characteristics list."
            },
            {
                id: 30,
                question: "What is the role of professional development for teachers implementing health curricula?",
                options: ["It is unnecessary", "It enhances instruction", "It confuses teachers", "It delays implementation"],
                correct: 1,
                rationale: "Ongoing professional development is critical for enhancing the effectiveness of instruction and student learning."
            }
        ];

        // --- 2. SHUFFLE & RENDER LOGIC (DO NOT EDIT) ---
        const quizData = rawQuizData.map(q => {
            const opts = q.options.map((text, i) => ({ text, isCorrect: i === q.correct }));
            for (let i = opts.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [opts[i], opts[j]] = [opts[j], opts[i]];
            }
            return { ...q, options: opts.map(o => o.text), correct: opts.findIndex(o => o.isCorrect) };
        });

        const container = document.getElementById('quiz-container');
        let score = 0; let answeredCount = 0;

        function renderQuiz() {
            document.getElementById('total-display').innerText = `/ ${quizData.length}`;
            container.innerHTML = quizData.map((q, index) => {
                return `
                <div class="card bg-white rounded-xl p-6 mb-6 border border-gray-100">
                    <div class="flex justify-between items-center mb-4 border-b border-gray-50 pb-3">
                        <span class="bg-blue-100 text-blue-800 text-xs font-bold px-3 py-1 rounded-full">Question ${index + 1}</span>
                         ${q.options.length === 2 ? '<span class="bg-purple-100 text-purple-800 text-xs font-bold px-2 py-1 rounded-md">True/False</span>' : ''}
                    </div>
                    <h3 class="text-gray-800 font-bold mb-6 text-lg leading-relaxed font-cairo" style="direction: ltr; text-align: left;">${q.question}</h3>
                    <div class="grid gap-3 ${q.options.length === 2 ? 'grid-cols-2' : ''}">
                        ${q.options.map((opt, i) => `<button onclick="checkAnswer(${index}, ${i})" class="option-btn option-btn-${index} w-full text-left px-5 py-4 rounded-xl border border-gray-200 hover:bg-blue-50 hover:border-blue-300 focus:outline-none flex items-center justify-between group bg-white"><span class="font-medium text-gray-700 group-hover:text-blue-700 font-sans">${opt}</span></button>`).join('')}
                    </div>
                    <div id="feedback-${index}" class="hidden-content mt-6 bg-blue-50 rounded-xl p-5 border border-blue-100 animate-fade-in text-left">
                        <p class="text-blue-800 text-sm leading-relaxed"><strong>Rationale:</strong> ${q.rationale}</p>
                    </div>
                </div>`;
            }).join('');
        }

        window.checkAnswer = function(qIndex, optIndex) {
            const q = quizData[qIndex];
            const feedback = document.getElementById(`feedback-${qIndex}`);
            const btns = document.querySelectorAll(`.option-btn-${qIndex}`);
            if (!feedback.classList.contains('hidden-content')) return;
            feedback.classList.remove('hidden-content');
            btns.forEach((btn, i) => {
                btn.disabled = true;
                if (i === q.correct) { btn.classList.add('correct-answer'); btn.innerHTML += '<i class="fas fa-check float-right"></i>'; }
                else if (i === optIndex) { btn.classList.add('wrong-answer'); btn.innerHTML += '<i class="fas fa-times float-right"></i>'; }
                else { btn.classList.add('opacity-50'); }
            });
            if (optIndex === q.correct) score++;
            answeredCount++;
            if (answeredCount === quizData.length) {
                document.getElementById('result-summary').classList.remove('hidden-content');
                document.getElementById('score-display').innerText = score;
                document.getElementById('score-message').innerText = (score/quizData.length*100) >= 50 ? "Good Job!" : "Keep Studying";
                setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }), 500);
            }
        };
        renderQuiz();
    </script>
</body>
</html>
