            // --- GENERAL GRAMMAR & VOCAB ---
            { category: "General Grammar & Vocabulary", question: "Ali talked ______ about employees' problems.", options: ["confident", "confidentially", "confidence", "confide"], correct: 1 },
            { category: "General Grammar & Vocabulary", question: "We are ______ qualified for these jobs.", options: ["high", "highly", "height", "heighten"], correct: 1 },
            { category: "General Grammar & Vocabulary", question: "Ashraf did not pass the exam as ______ as he thought.", options: ["easy", "easily", "ease", "easier"], correct: 1 },
            { category: "General Grammar & Vocabulary", question: "She is wearing a ______ dress.", options: ["colourful", "colourfully", "colour", "colouring"], correct: 0 },
            { category: "General Grammar & Vocabulary", question: "You should do it ______.", options: ["careful", "carefully", "care", "caring"], correct: 1 },
            { category: "General Grammar & Vocabulary", question: "I haven't seen her ______.", options: ["late", "lately", "later", "latest"], correct: 1 },
            { category: "General Grammar & Vocabulary", question: "You didn't do your work ______.", options: ["correct", "correctly", "correction", "correcting"], correct: 1 },
            { category: "General Grammar & Vocabulary", question: "Are you ______ frustrated?", options: ["serious", "seriously", "seriousness", "series"], correct: 1 },
            { category: "General Grammar & Vocabulary", question: "That engine is very ______.", options: ["noise", "noisy", "noisily", "noisome"], correct: 1 },
            { category: "General Grammar & Vocabulary", question: "The animals were ______.", options: ["thirsty", "thirst", "thirstily", "thirsting"], correct: 0 },
            { category: "General Grammar & Vocabulary", question: "Laura is walking ______.", options: ["quiet", "quietly", "quietness", "quietude"], correct: 1 },
            { category: "General Grammar & Vocabulary", question: "Jessica is ______ a brilliant woman that everyone admires her.", options: ["so", "such", "very", "too"], correct: 1 },
            { category: "General Grammar & Vocabulary", question: "He made ______ an unforgivable mistake that it caused him his marriage.", options: ["so", "such", "very", "an"], correct: 1 },
            { category: "General Grammar & Vocabulary", question: "She is ______ shy that she would only talk to her parents.", options: ["so", "such", "very", "much"], correct: 0 },
            { category: "General Grammar & Vocabulary", question: "The teacher was ______ tired that she had to dismiss the class.", options: ["so", "such", "very", "quite"], correct: 0 },
            { category: "General Grammar & Vocabulary", question: "Those shoes are ______ expensive that I can never afford them.", options: ["so", "such", "very", "really"], correct: 0 },
            { category: "General Grammar & Vocabulary", question: "I have ______ great memories with her that I will never forget her.", options: ["so", "such", "very", "many"], correct: 1 },
            { category: "General Grammar & Vocabulary", question: "They were ______ close to winning that everyone felt disappointed with the loss.", options: ["so", "such", "very", "too"], correct: 0 },
            { category: "General Grammar & Vocabulary", question: "He is ______ a clever boy that he can learn multiple languages at the same time.", options: ["so", "such", "very", "a"], correct: 1 },

            // --- PREPOSITIONS ---
            { category: "Insert the proper preposition", question: "You succeeded ______ your hard work.", options: ["Until", "From", "Because", "With"], correct: 2 },
            { category: "Insert the proper preposition", question: "______ a single student was absent.", options: ["On", "Like", "Not", "Away"], correct: 2 },
            { category: "Insert the proper preposition", question: "The mischievous are different ______ the righteous.", options: ["from", "with", "of", "for"], correct: 1 },
            { category: "Insert the proper preposition", question: "May God be pleased ______ him.", options: ["for", "with", "on", "of"], correct: 1 },
            { category: "Insert the proper preposition", question: "______ the trunks of palm trees.", options: ["Of", "Away", "On", "Until"], correct: 2 },
            { category: "Insert the proper preposition", question: "Took ______ their light.", options: ["until", "away", "like", "on"], correct: 1 },
            { category: "Insert the proper preposition", question: "a spring ______ which Allah's servants will drink.", options: ["for", "of", "with", "from"], correct: 1 },
            { category: "Insert the proper preposition", question: "the day when I slaughtered my horse ______ the virgins.", options: ["from", "on", "for", "like"], correct: 2 },
            { category: "Insert the proper preposition", question: "There is nothing ______ Him.", options: ["Not", "Until", "Like", "From"], correct: 2 },
            { category: "Insert the proper preposition", question: "______ a camel passes through the eye of a needle.", options: ["Because", "Away", "Until", "Like"], correct: 2 },
        ];

        // 2. SHUFFLE & RENDER LOGIC
        const quizData = rawQuizData.map(q => {
            const opts = q.options.map((text, i) => ({ text, isCorrect: i === q.correct }));
            // Shuffle options
            for (let i = opts.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [opts[i], opts[j]] = [opts[j], opts[i]];
            }
            return { ...q, options: opts.map(o => o.text), correct: opts.findIndex(o => o.isCorrect) };
        });

        const container = document.getElementById('quiz-container');
        let score = 0; let answeredCount = 0;
        let currentCategory = "";

        function renderQuiz() {
            document.getElementById('total-display').innerText = `/ ${quizData.length}`;
            let htmlContent = "";

            quizData.forEach((q, index) => {
                // Section Header logic
                if (q.category !== currentCategory) {
                    currentCategory = q.category;
                    htmlContent += `
                        <div class="section-header">
                            <span>${currentCategory}</span>
                        </div>
                    `;
                }

                htmlContent += `
                <div class="card bg-white rounded-xl p-6 mb-6 border border-gray-100">
                    <div class="flex justify-between items-center mb-4 border-b border-gray-50 pb-3">
                        <span class="bg-blue-100 text-blue-800 text-xs font-bold px-3 py-1 rounded-full">Question ${index + 1}</span>
                         ${q.options.length === 2 ? '<span class="bg-purple-100 text-purple-800 text-xs font-bold px-2 py-1 rounded-md">True/False</span>' : ''}
                    </div>
                    <h3 class="text-gray-800 font-bold mb-6 text-lg leading-relaxed font-cairo" style="direction: ltr; text-align: left;">${q.question}</h3>
                    <div class="grid gap-3 ${q.options.length === 2 ? 'grid-cols-2' : ''}">
                        ${q.options.map((opt, i) => `<button onclick="checkAnswer(${index}, ${i})" class="option-btn option-btn-${index} w-full text-left px-5 py-4 rounded-xl border border-gray-200 hover:bg-blue-50 hover:border-blue-300 focus:outline-none flex items-center justify-between group bg-white"><span class="font-medium text-gray-700 group-hover:text-blue-700 font-sans">${opt}</span></button>`).join('')}
                    </div>
                </div>`;
            });

            container.innerHTML = htmlContent;
        }

        window.checkAnswer = function(qIndex, optIndex) {
            const q = quizData[qIndex];
            const btns = document.querySelectorAll(`.option-btn-${qIndex}`);
            
            if (btns[0].disabled) return;

            btns.forEach((btn, i) => {
                btn.disabled = true;
                if (i === q.correct) { btn.classList.add('correct-answer'); btn.innerHTML += '<i class="fas fa-check float-right"></i>'; }
                else if (i === optIndex) { btn.classList.add('wrong-answer'); btn.innerHTML += '<i class="fas fa-times float-right"></i>'; }
                else { btn.classList.add('opacity-50'); }
            });

            if (optIndex !== q.correct) {
                btns[q.correct].classList.remove('opacity-50');
                btns[q.correct].classList.add('correct-answer');
                if(!btns[q.correct].innerHTML.includes('fa-check')) {
                     btns[q.correct].innerHTML += '<i class="fas fa-check float-right"></i>';
                }
            }

            if (optIndex === q.correct) score++;
            answeredCount++;
            if (answeredCount === quizData.length) {
                document.getElementById('result-summary').classList.remove('hidden-content');
                document.getElementById('score-display').innerText = score;
                document.getElementById('score-message').innerText = (score/quizData.length*100) >= 50 ? "Excellent Job!" : "Keep Practicing";
                setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }), 500);
            }
        };
        renderQuiz();
    </script>
