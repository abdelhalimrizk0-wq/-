<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Noto+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Noto Sans', 'Cairo', sans-serif; background-color: #f8fafc; }
        .card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card:hover { transform: translateY(-4px); box-shadow: 0 12px 20px -5px rgba(0, 0, 0, 0.1); }
        .correct-answer { background-color: #dcfce7 !important; border-color: #22c55e !important; color: #15803d !important; }
        .wrong-answer { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #b91c1c !important; }
        .hidden-content { display: none; }
        .option-btn { transition: all 0.2s; }
        .option-btn:disabled { cursor: default; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="pb-12 bg-gray-50">
    <div class="max-w-3xl mx-auto px-4 py-8">
        <div class="bg-white rounded-2xl shadow-sm p-8 mb-8 text-center border-t-4 border-blue-600 relative overflow-hidden">
            <div class="absolute top-0 right-0 p-4 opacity-10"><i class="fas fa-user-md text-8xl text-blue-600"></i></div>
            
            <h1 class="text-3xl font-bold text-gray-800 mb-2 font-cairo text-center" dir="auto">2. Planning Phase</h1>
            
            <div class="flex items-center justify-center gap-2 text-green-600 font-semibold bg-green-50 w-fit mx-auto px-4 py-1 rounded-full text-sm">
                <i class="fas fa-check-circle"></i> "تم صنع هذا الامتحان بواسطة عبدالحليم رزق"
            </div>
        </div>
        <div id="quiz-container"></div>
        <div id="result-summary" class="hidden-content bg-white rounded-2xl shadow-lg p-8 text-center mt-8 border border-gray-100">
            <h2 class="text-2xl font-bold text-gray-800">Exam Completed</h2>
            <div class="mt-4 text-4xl font-bold text-blue-600 mb-2">
                <span id="score-display">0</span> <span class="text-xl text-gray-400" id="total-display"></span>
            </div>
            <p id="score-message" class="text-gray-500 mb-6"></p>
            <button onclick="location.reload()" class="bg-blue-600 text-white px-8 py-3 rounded-xl hover:bg-blue-700 transition shadow-lg hover:shadow-blue-200">
                <i class="fas fa-redo mr-2"></i> Restart Exam
            </button>
        </div>
    </div>

    <script>
        // --- 1. QUESTIONS ARRAY (GENERATE 50 QUESTIONS HERE) ---
        const rawQuizData = [
            {
                id: 1,
                question: "Which domain of learning is primarily responsible for the development of attitudes?",
                options: ["Cognitive", "Affective", "Psychomotor", "Physiological"],
                correct: 1,
                rationale: "The affective domain relates to attitudes, while cognitive relates to knowledge and psychomotor relates to skills."
            },
            {
                id: 2,
                question: "Which of the following is considered a component of the physical learning environment?",
                options: ["Willingness to learn", "Adequate ventilation", "Low anxiety", "Positive attitude"],
                correct: 1,
                rationale: "Physical environment includes tangible factors like lighting, space, and ventilation, whereas willingness and anxiety are psychological."
            },
            {
                id: 3,
                question: "What is the second step of the health education process?",
                options: ["Assessment", "Evaluation", "Implementation", "Planning"],
                correct: 3,
                rationale: "The text explicitly states that the second step of the health education process is planning."
            },
            {
                id: 4,
                question: "Which method is most appropriate for evaluating if a patient has learned a psychomotor skill?",
                options: ["Written questionnaire", "Return demonstration", "Oral interview", "Group discussion"],
                correct: 1,
                rationale: "Observing return demonstrations is the best way to see whether the patient has learned necessary psychomotor skills."
            },
            {
                id: 5,
                question: "True or False: The selection of teaching methods should ignore the educational background of the learner.",
                options: ["True", "False"],
                correct: 1,
                rationale: "The selection of teaching methods is based on learner characteristics, including educational background."
            },
            {
                id: 6,
                question: "Which item is classified as a teaching material rather than a teaching method?",
                options: ["Role playing", "Demonstration", "Flip charts", "One on one sessions"],
                correct: 2,
                rationale: "Flip charts are physical materials used for teaching, whereas role playing and demonstrations are methods of instruction."
            },
            {
                id: 7,
                question: "What are the four specific components of an educational objective?",
                options: ["Action verb content condition criteria", "Subject verb object time", "Assessment diagnosis planning evaluation", "Input process output feedback"],
                correct: 0,
                rationale: "The educational objective is composed of 4 components: Action verb, Content, Condition, and Criteria."
            },
            {
                id: 8,
                question: "When does the process of setting client goals begin?",
                options: ["Before the assessment phase", "Directly after formulating the nursing diagnosis", "During the evaluation phase", "After the teaching session ends"],
                correct: 1,
                rationale: "Setting the client's goals begins directly after formulating the nursing diagnosis."
            },
            {
                id: 9,
                question: "Which characteristic is essential for a well-constructed educational objective?",
                options: ["Abstract", "Measurable", "Ambiguous", "Complex"],
                correct: 1,
                rationale: "Client objectives should be measurable, observable, clear, specific, realistic, and logic."
            },
            {
                id: 10,
                question: "True or False: High stress and anxiety are part of the physical environment considerations.",
                options: ["True", "False"],
                correct: 1,
                rationale: "Stress and anxiety are factors of the psychological environment, not the physical one."
            },
            {
                id: 11,
                question: "Which evaluation method is best suited to measure cognitive learning?",
                options: ["Simple written tests", "Return demonstration", "Physical exercise", "Weight measurement"],
                correct: 0,
                rationale: "Giving simple written tests or questionnaires is a way to measure cognitive learning."
            },
            {
                id: 12,
                question: "Which factor should be considered when choosing teaching content?",
                options: ["Relevance to client needs", "Cost of the hospital stay", "Preferences of the administrator", "Time of day"],
                correct: 0,
                rationale: "The health educator should consider the relevance of content to client needs, interest, and ability."
            },
            {
                id: 13,
                question: "True or False: Client goals should be settled with client participation.",
                options: ["True", "False"],
                correct: 0,
                rationale: "Clients' goals should be settled with client participation to consider their desires and needs."
            },
            {
                id: 14,
                question: "What is the final step in the planning phase?",
                options: ["Selecting instrument media", "Determining objectives", "Constructing the evaluation strategy", "Preparing the environment"],
                correct: 2,
                rationale: "The final steps in the planning phase are the construction of an evaluation tool."
            },
            {
                id: 15,
                question: "Which of the following is a criterion for selecting teaching methods?",
                options: ["The number of learners", "The hospital location", "The insurance provider", "The weather forecast"],
                correct: 0,
                rationale: "The selection of teaching methods is based on the number of learners, among other factors like learner characteristics."
            },
            {
                id: 16,
                question: "True or False: Role playing is considered a teaching material.",
                options: ["True", "False"],
                correct: 1,
                rationale: "Role playing is listed as a teaching method, not a material. Materials include items like pamphlets and videos."
            },
            {
                id: 17,
                question: "How can a health educator assess if a patient is following a modified diet plan?",
                options: ["By assessing physiological measurements", "By giving a written test", "By asking the family only", "By using flashcards"],
                correct: 0,
                rationale: "Assessing physiological measurements such as weight and blood pressure helps determine if a patient is following a diet plan."
            },
            {
                id: 18,
                question: "Which domain of learning focuses on skills?",
                options: ["Cognitive", "Affective", "Psychomotor", "Social"],
                correct: 2,
                rationale: "The Psychomotor domain is responsible for skills, while Cognitive is for knowledge and Affective is for attitude."
            },
            {
                id: 19,
                question: "True or False: The educational objective is the core of the teaching plan.",
                options: ["True", "False"],
                correct: 0,
                rationale: "The text states that the educational objectives are the core of the teaching plan."
            },
            {
                id: 20,
                question: "Which element is considered a psychological environmental factor?",
                options: ["Adequate lighting", "Comfortable chairs", "Willingness to learn", "Available resources"],
                correct: 2,
                rationale: "Psychological environment includes willingness to learn, positive attitude, and low stress."
            }
        ];

        // --- 2. SHUFFLE & RENDER LOGIC (DO NOT EDIT) ---
        const quizData = rawQuizData.map(q => {
            const opts = q.options.map((text, i) => ({ text, isCorrect: i === q.correct }));
            for (let i = opts.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [opts[i], opts[j]] = [opts[j], opts[i]];
            }
            return { ...q, options: opts.map(o => o.text), correct: opts.findIndex(o => o.isCorrect) };
        });

        const container = document.getElementById('quiz-container');
        let score = 0; let answeredCount = 0;

        function renderQuiz() {
            document.getElementById('total-display').innerText = `/ ${quizData.length}`;
            container.innerHTML = quizData.map((q, index) => {
                return `
                <div class="card bg-white rounded-xl p-6 mb-6 border border-gray-100">
                    <div class="flex justify-between items-center mb-4 border-b border-gray-50 pb-3">
                        <span class="bg-blue-100 text-blue-800 text-xs font-bold px-3 py-1 rounded-full">Question ${index + 1}</span>
                         ${q.options.length === 2 ? '<span class="bg-purple-100 text-purple-800 text-xs font-bold px-2 py-1 rounded-md">True/False</span>' : ''}
                    </div>
                    <h3 class="text-gray-800 font-bold mb-6 text-lg leading-relaxed font-cairo" style="direction: ltr; text-align: left;">${q.question}</h3>
                    <div class="grid gap-3 ${q.options.length === 2 ? 'grid-cols-2' : ''}">
                        ${q.options.map((opt, i) => `<button onclick="checkAnswer(${index}, ${i})" class="option-btn option-btn-${index} w-full text-left px-5 py-4 rounded-xl border border-gray-200 hover:bg-blue-50 hover:border-blue-300 focus:outline-none flex items-center justify-between group bg-white"><span class="font-medium text-gray-700 group-hover:text-blue-700 font-sans">${opt}</span></button>`).join('')}
                    </div>
                    <div id="feedback-${index}" class="hidden-content mt-6 bg-blue-50 rounded-xl p-5 border border-blue-100 animate-fade-in text-left">
                        <p class="text-blue-800 text-sm leading-relaxed"><strong>Rationale:</strong> ${q.rationale}</p>
                    </div>
                </div>`;
            }).join('');
        }

        window.checkAnswer = function(qIndex, optIndex) {
            const q = quizData[qIndex];
            const feedback = document.getElementById(`feedback-${qIndex}`);
            const btns = document.querySelectorAll(`.option-btn-${qIndex}`);
            if (!feedback.classList.contains('hidden-content')) return;
            feedback.classList.remove('hidden-content');
            btns.forEach((btn, i) => {
                btn.disabled = true;
                if (i === q.correct) { btn.classList.add('correct-answer'); btn.innerHTML += '<i class="fas fa-check float-right"></i>'; }
                else if (i === optIndex) { btn.classList.add('wrong-answer'); btn.innerHTML += '<i class="fas fa-times float-right"></i>'; }
                else { btn.classList.add('opacity-50'); }
            });
            if (optIndex === q.correct) score++;
            answeredCount++;
            if (answeredCount === quizData.length) {
                document.getElementById('result-summary').classList.remove('hidden-content');
                document.getElementById('score-display').innerText = score;
                document.getElementById('score-message').innerText = (score/quizData.length*100) >= 50 ? "Good Job!" : "Keep Studying";
                setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }), 500);
            }
        };
        renderQuiz();
    </script>
</body>
</html>
