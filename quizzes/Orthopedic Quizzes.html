                    { question: "Walking with a cane requires the patient to advance the unaffected leg before moving the cane.", options: ["True", "False"], correct: 1, rationale: "The patient must advance the cane first, followed by the weaker leg, and finally the stronger leg." },
                    { question: "What is a recognized disadvantage of standard axillary crutches compared to forearm crutches?", options: ["They provide less hand freedom", "They are significantly heavier and harder to lift", "They require absolutely no balance to operate", "They eliminate all weight bearing capabilities"], correct: 0, rationale: "Forearm crutches allow better hand freedom than axillary crutches and are often preferred for long-term use." },
                    { question: "Which patient factor significantly dictates the exact removal time of an external fixator?", options: ["The specific type of fracture", "The brand of the fixation device", "The patient exact height", "The type of standard cane used"], correct: 0, rationale: "The exact removal time depends on how fast the bone heals, the type of fracture (simple or complex), and the patient's age and health." },
                    { question: "What is the primary orthopedic indication for the medication Unasyn?", options: ["Antibiotic treatment", "Anticoagulant therapy", "Narcotic pain relief", "Gastric acid inhibition"], correct: 0, rationale: "Unasyn or Unictam is an antibiotic used to treat bacterial infections." },
                    { question: "Pin tract infection is considered the most common complication of external fixation devices.", options: ["True", "False"], correct: 0, rationale: "Without proper technique and care, pin tract infection is the most common complication, occurring in 30 percent of patients." },
                    { question: "What is a critical precaution when setting up a patient to use an underarm crutch?", options: ["Ensure there is enough padding at the top", "Remove the rubber stoppers completely", "Lower the hand grips to knee level", "Ensure the axillary pad bears full body weight"], correct: 0, rationale: "It is crucial to ensure there is enough padding at the top and on the handle, and to avoid applying weight directly to the armpits." },
                    { question: "Which diagnostic method differentiates osteoarthritis from rheumatoid arthritis based on fluid characteristics?", options: ["Analysis of synovial fluid", "Standard lateral X ray", "Radionuclide bone scan", "Complete blood count"], correct: 0, rationale: "Synovial fluid analysis differentiates OA from RA. In OA it looks normal but increased, while in RA it is cloudy and inflammatory." },
                    { question: "How long should a patient typically wait to see symptoms of osteoarthritis if they are under fifty years old?", options: ["Few patients have symptoms until after age fifty", "Symptoms always appear completely by age thirty", "Symptoms develop rapidly within a single month", "Symptoms are strictly present at birth"], correct: 0, rationale: "Few patients have symptoms until after age 50. By age 65, almost 50 percent of adults report having arthritis." },
                    { question: "External fixation requires adjusting the device by exactly five millimeters every day.", options: ["True", "False"], correct: 1, rationale: "Adjustments are typically made daily at about 1 millimeter per day to stimulate callus and bone formation." },
                    { question: "Which complication describes the neurovascular impairment associated with compartmental syndrome?", options: ["Pallor and pulselessness", "Hyperemia and bounding pulse", "Immediate skin sloughing", "Rapid bone decalcification"], correct: 0, rationale: "Compartment syndrome presents with pallor, pain, paresthesia, paralysis, and pulselessness." },
                    { question: "When teaching a patient to rise from a sitting position with crutches, how should they hold the devices?", options: ["Hold both crutches on the side opposite the injured leg", "Hold one crutch firmly in each hand", "Leave the crutches resting on the floor until standing", "Hold both crutches on the same side as the injured leg"], correct: 0, rationale: "The patient should hold both crutches by the handles using the opposite hand to the injured leg when standing up." },
                    { question: "Which condition is classified as an indication for the use of an external fixator?", options: ["Severe open fractures", "Simple hairline fractures", "Minor soft tissue bruises", "Advanced osteoporosis"], correct: 0, rationale: "Stabilization of severe open fractures is a primary indication for using an external fixator." },
                    { question: "Toe touch down weight bearing means the extremity rests on the floor but supports zero weight.", options: ["True", "False"], correct: 0, rationale: "In toe touch down weight bearing, the foot may rest on the floor, but no weight is distributed through that extremity." },
                    { question: "Which assistive device requires the patient to have sufficient balance and upper body strength to lift it entirely?", options: ["Standard walker without wheels", "Four wheel rolling walker", "Two wheel rolling walker", "Standard axillary crutch"], correct: 0, rationale: "A standard walker requires the patient to completely lift the device for any movement, requiring sufficient upper body strength." },
                    { question: "What is the primary action of the medication Alphachymotrypsin?", options: ["Anti inflammatory action", "Antibiotic action", "Anticoagulant action", "Proton pump inhibition"], correct: 0, rationale: "Alphachymotrypsin functions as an anti-inflammatory medication." },
                    { question: "How does the cartilage surface appear during stage two mild osteoarthritis?", options: ["The surface becomes rough", "The surface remains perfectly smooth", "The surface completely disappears", "The surface develops deep bleeding ulcers"], correct: 0, rationale: "In stage 2 mild osteoarthritis, the cartilage surface becomes rough, and the joint space begins to narrow." },
                    { question: "A quadripod cane provides a smaller base of support than a standard straight cane.", options: ["True", "False"], correct: 1, rationale: "A quadripod cane has four legs and therefore provides a larger base of support than a standard cane." },
                    { question: "What physiological action helps protect an osteoarthritic joint during conservative management?", options: ["Lower extremity strength training", "Complete joint immobilization", "Prolonged bed rest therapy", "High impact running exercises"], correct: 0, rationale: "Exercise and lower extremity strength training have been found to prevent OA progression and decrease symptoms." },
                    { question: "Which sign indicates a potential pin tract infection requiring immediate medical evaluation?", options: ["Purulent drainage and warmth", "Clear serous drainage", "Slight crusting at the base", "Painless stable pin insertion"], correct: 0, rationale: "Signs of infection include redness, warmth, swelling, pain, tenderness, and serous or purulent foul-smelling drainage." },
                    { question: "What specific anatomical positioning prevents contractures after a total knee replacement?", options: ["Keep the operated leg completely straight", "Place a large pillow securely under the knee", "Cross the affected leg over the unaffected leg", "Twist the operated limb completely outward"], correct: 0, rationale: "The operated leg must be kept straight; place a small pillow under the ankle, never under the knee, to prevent joint bending." },
                    { question: "Patients should avoid wearing low heeled shoes when using a standard walker.", options: ["True", "False"], correct: 1, rationale: "Patients are specifically advised to wear supportive, low-heeled shoes with good grips when using assistive devices." },
                    { question: "What is the clinical definition of a hybrid external fixator?", options: ["Combines parts of both unilateral and circular fixators", "Combines internal plates with external rigid casts", "Combines standard canes with rolling walkers", "Combines narcotic medications with antibiotics"], correct: 0, rationale: "Hybrid fixators combine parts of both unilateral and circular fixators to be very flexible and adaptable." },
                    { question: "Which condition is a major risk factor for developing secondary osteoarthritis?", options: ["Previous severe joint injury", "Normal physiological aging", "Mild seasonal allergies", "Routine daily walking"], correct: 0, rationale: "Secondary osteoarthritis results from previous joint injury or inflammatory disease, whereas primary OA is idiopathic." },
                    { question: "When teaching a patient to sit down using crutches, how should the injured leg be positioned?", options: ["Keep the injured leg extended forward", "Tuck the injured leg firmly under the chair", "Cross the injured leg behind the strong leg", "Rest the injured leg heavily on the ground"], correct: 0, rationale: "When sitting down, the patient should keep the injured leg forward while shifting weight to the non-affected leg." },
                    { question: "Weight loss is recommended because it dramatically decreases excess stress on weight bearing joints.", options: ["True", "False"], correct: 0, rationale: "Weight loss decreases excess load on the joint and is extremely beneficial for managing osteoarthritis." },
                    { question: "Which component of the external fixator provides full circumferential support?", options: ["Circular metal rings", "Straight connecting rods", "Tensioned metal wires", "Securing metal clamps"], correct: 0, rationale: "Rings are circular metal frames surrounding the limb that provide full circumferential support." },
                    { question: "What is the primary therapeutic indication for prescribing Zoloft to an orthopedic patient?", options: ["Managing chronic pain conditions", "Eliminating severe bacterial infections", "Preventing immediate blood coagulation", "Relaxing spastic skeletal muscles"], correct: 0, rationale: "Zoloft is an antidepressant used specifically for patients suffering from chronic pain." },
                    { question: "Why should an external fixator patient immediately report any changes in neurovascular status?", options: ["It may indicate compartmental syndrome", "It confirms the bone has completely healed", "It proves the adjustment rate is correct", "It shows the pins are deeply embedded"], correct: 0, rationale: "Changes in neurovascular status, such as pallor or pulselessness, may indicate compartment syndrome, a severe complication." },
                    { question: "The Ilizarov fixator allows for walking and joint movement during the bone healing process.", options: ["True", "False"], correct: 0, rationale: "The Ilizarov fixator is a circular device that allows walking and joint movement during healing." }
                ]
            },
            {
                title: "Assessment of Musculoskeletal System",
                icon: "fa-stethoscope",
                data: [
                    { question: "What is the primary characteristic of bone pain as described during a musculoskeletal assessment?", options: ["Dull and deep ache", "Sharp and shooting pain", "Soreness and aching pain", "Throbbing and pulsating pain"], correct: 0, rationale: "Bone pain is characteristically described as a dull, deep ache that is boring in nature." },
                    { question: "Which scale grade represents active muscle movement against gravity but not against resistance?", options: ["Grade Two", "Grade Three", "Grade Four", "Grade Five"], correct: 1, rationale: "A grade of 3 on the Muscle Strength Scale indicates active movement against gravity but not against resistance." },
                    { question: "From which anatomical landmarks should a nurse measure to determine leg length?", options: ["Anterior superior iliac spine to the medial malleolus", "Posterior superior iliac spine to the lateral malleolus", "Umbilicus to the medial malleolus", "Greater trochanter to the lateral malleolus"], correct: 0, rationale: "Measuring each leg is done by using a measuring tape from the anterior superior iliac spine to the medial malleolus." },
                    { question: "Which gait abnormality is classically associated with Parkinson disease?", options: ["Steppage gait", "Limping gait", "Shuffling gait", "Spastic gait"], correct: 2, rationale: "A shuffling gait is typical of someone with Parkinson's disease." },
                    { question: "What defines the condition known as genu valgum?", options: ["Outward bowing of the leg while standing", "Inward angling of the upper leg with ankles spread apart", "Exaggerated forward curvature of the thoracic spine", "Lateral curving deviation of the spinal column"], correct: 1, rationale: "Genu valgum is a condition in which the upper leg angles inward while the ankles are spread apart." },
                    { question: "How frequently should a nurse reassess the neurovascular status of a patient with skin traction?", options: ["Every single hour", "Every two hours", "Every four hours", "Every eight hours"], correct: 2, rationale: "The nurse must reassess the neurovascular status daily every 4 hours for a patient with skin traction." },
                    { question: "When applying skin traction bandages that cross the knee for a high femur fracture, which wrapping method should be utilized around the joint?", options: ["Circular wrapping method", "Spiral wrapping method", "Figure of eight wrapping method", "Recurrent turn wrapping method"], correct: 2, rationale: "If bandages will cross the knee, a figure of eight will be used around it." },
                    { question: "Which nerves are specifically assessed for sensation when evaluating the neurovascular status of the lower limb prior to applying skin traction?", options: ["Sciatic and femoral nerves", "Peroneal and tibial nerves", "Saphenous and sural nerves", "Obturator and pudendal nerves"], correct: 1, rationale: "Sensation in the lower limb is assessed by checking the Peroneal nerve and Tibial nerve." },
                    { question: "Where is the exact midpoint measured to assess the size of the biceps muscle?", options: ["Between the acromion process and the olecranon process", "Between the coracoid process and the radial styloid", "Between the medial epicondyle and the ulnar styloid", "Between the greater tubercle and the lateral epicondyle"], correct: 0, rationale: "The size of the biceps muscle is taken by measuring arm girth at the mid-point between the acromion process and olecranon process." },
                    { question: "What is a primary purpose of applying skin traction for a patient with back pain?", options: ["To permanently fuse the spinal vertebrae", "To lessen muscle spasm through immobilization", "To fully restore the active range of motion", "To correct severe congenital spinal scoliosis"], correct: 1, rationale: "Skin traction is used to lessen muscle spasm in back pain via immobilization by traction." },
                    { question: "Which action demonstrates the correct principle for maintaining proper traction?", options: ["Allowing the weights to rest firmly on the floor", "Removing the weights briefly during patient transfers", "Ensuring the weights hang freely at all times", "Securing the traction knots tightly within the pulleys"], correct: 2, rationale: "A key principle of traction is that weights must hang free and not rest on the bed or floor." },
                    { question: "Muscular pain is characteristically described as a dull and boring deep ache.", options: ["True", "False"], correct: 1, rationale: "Muscular pain is described as soreness or aching and referred to as muscle cramps, whereas bone pain is dull, deep, and boring." },
                    { question: "A score of one on the Muscle Strength Scale indicates a trace muscle contraction such as a twitch.", options: ["True", "False"], correct: 0, rationale: "A grade 1 on the Muscle Strength Scale indicates trace muscle contraction, such as a twitch." },
                    { question: "Passive range of motion means the joint is moved entirely by the muscles surrounding that specific joint.", options: ["True", "False"], correct: 1, rationale: "Active range of motion means the joint is moved by surrounding muscles, while passive range of motion means the joint is moved by the examiner." },
                    { question: "Traction bandages should be removed once a day to wash the limb and observe the skin condition.", options: ["True", "False"], correct: 0, rationale: "Care for a patient with skin traction involves removing the bandages once a day to wash the limb and observe the skin." }
                ]
            }
        ];

        let activeQuizIndex = -1;
        let quizData = [];
        let score = 0; 
        let answeredCount = 0;

        // --- 1. INITIALIZE MENU ---
        function initMenu() {
            const menuContainer = document.getElementById('menu-cards-container');
            menuContainer.innerHTML = allQuizzes.map((quiz, index) => {
                return `
                <button onclick="startQuiz(${index})" class="menu-btn bg-white rounded-2xl shadow-sm p-6 border border-gray-100 hover:border-blue-400 hover:shadow-md text-left flex items-start gap-4 h-full w-full">
                    <div class="bg-blue-50 p-4 rounded-xl text-blue-600">
                        <i class="fas ${quiz.icon} text-3xl"></i>
                    </div>
                    <div class="flex-1">
                        <h3 class="font-bold text-gray-800 text-lg mb-2 font-cairo">${quiz.title}</h3>
                        <p class="text-sm text-gray-500 font-cairo">${quiz.data.length} Questions</p>
                    </div>
                </button>`;
            }).join('');
        }

        // --- 2. SWITCHING VIEWS ---
        function showMenu() {
            document.getElementById('quiz-area').classList.add('hidden-content');
            document.getElementById('main-menu').classList.remove('hidden-content');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function startQuiz(index) {
            activeQuizIndex = index;
            const rawQuizData = allQuizzes[index].data;
            
            // Deep copy and shuffle questions and options
            quizData = rawQuizData.map(q => {
                const opts = q.options.map((text, i) => ({ text, isCorrect: i === q.correct }));
                for (let i = opts.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [opts[i], opts[j]] = [opts[j], opts[i]];
                }
                return { ...q, options: opts.map(o => o.text), correct: opts.findIndex(o => o.isCorrect) };
            });

            // Reset States
            score = 0;
            answeredCount = 0;
            
            // Update UI
            document.getElementById('active-quiz-title').innerText = allQuizzes[index].title;
            document.getElementById('result-summary').classList.add('hidden-content');
            document.getElementById('main-menu').classList.add('hidden-content');
            document.getElementById('quiz-area').classList.remove('hidden-content');
            
            renderQuiz();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function restartCurrentQuiz() {
            if (activeQuizIndex !== -1) {
                startQuiz(activeQuizIndex);
            }
        }

        // --- 3. RENDER & CHECK LOGIC ---
        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            document.getElementById('total-display').innerText = `/ ${quizData.length}`;
            container.innerHTML = quizData.map((q, index) => {
                return `
                <div class="card bg-white rounded-xl p-6 mb-6 border border-gray-100">
                    <div class="flex justify-between items-center mb-4 border-b border-gray-50 pb-3">
                        <span class="bg-blue-100 text-blue-800 text-xs font-bold px-3 py-1 rounded-full">Question ${index + 1}</span>
                         ${q.options.length === 2 ? '<span class="bg-purple-100 text-purple-800 text-xs font-bold px-2 py-1 rounded-md">True/False</span>' : ''}
                    </div>
                    <h3 class="text-gray-800 font-bold mb-6 text-lg leading-relaxed font-cairo" style="direction: ltr; text-align: left;">${q.question}</h3>
                    <div class="grid gap-3 ${q.options.length === 2 ? 'grid-cols-2' : ''}">
                        ${q.options.map((opt, i) => `<button onclick="checkAnswer(${index}, ${i})" class="option-btn option-btn-${index} w-full text-left px-5 py-4 rounded-xl border border-gray-200 hover:bg-blue-50 hover:border-blue-300 focus:outline-none flex items-center justify-between group bg-white"><span class="font-medium text-gray-700 group-hover:text-blue-700 font-sans">${opt}</span></button>`).join('')}
                    </div>
                    <div id="feedback-${index}" class="hidden-content mt-6 bg-blue-50 rounded-xl p-5 border border-blue-100 animate-fade-in text-left">
                        <p class="text-blue-800 text-sm leading-relaxed"><strong>Rationale:</strong> ${q.rationale}</p>
                    </div>
                </div>`;
            }).join('');
        }

        window.checkAnswer = function(qIndex, optIndex) {
            const q = quizData[qIndex];
            const feedback = document.getElementById(`feedback-${qIndex}`);
            const btns = document.querySelectorAll(`.option-btn-${qIndex}`);
            if (!feedback.classList.contains('hidden-content')) return;
            feedback.classList.remove('hidden-content');
            btns.forEach((btn, i) => {
                btn.disabled = true;
                if (i === q.correct) { btn.classList.add('correct-answer'); btn.innerHTML += '<i class="fas fa-check float-right"></i>'; }
                else if (i === optIndex) { btn.classList.add('wrong-answer'); btn.innerHTML += '<i class="fas fa-times float-right"></i>'; }
                else { btn.classList.add('opacity-50'); }
            });
            if (optIndex === q.correct) score++;
            answeredCount++;
            if (answeredCount === quizData.length) {
                document.getElementById('result-summary').classList.remove('hidden-content');
                document.getElementById('score-display').innerText = score;
                document.getElementById('score-message').innerText = (score/quizData.length*100) >= 50 ? "Good Job!" : "Keep Studying";
                setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }), 500);
            }
        };

        // Initialize on load
        initMenu();
    </script>
</body>
</html>
