                { id: 12, question: "Inability to completely empty the bladder significantly increases the clinical risk of developing which secondary condition?", options:["Bladder stones", "Renal cell carcinoma", "Testicular torsion", "Epididymitis"], correct: 0, rationale: "Bladder stones are generally caused by an inability to completely empty the bladder, leading to stagnant urine and crystal formation." },
                { id: 13, question: "The physical examination utilized to manually feel the back of the prostate gland for enlargement is formally known as what procedure?", options:["Digital rectal examination", "Transrectal ultrasonography", "Cystoscopic urethral evaluation", "Suprapubic bladder palpation"], correct: 0, rationale: "During a digital rectal examination, the physician inserts a gloved finger exactly into the rectum to manually palpate and feel the back of the prostate gland." },
                { id: 14, question: "During a diagnostic workup for an enlarged prostate a prostate specific antigen blood test is primarily utilized to rule out which condition?", options:["Prostate cancer", "Systemic infection", "Renal failure", "Bladder stones"], correct: 0, rationale: "Elevated levels of PSA in the blood may sometimes be an indicator of prostate cancer, making it a critical test before initiating BPH therapy." },
                { id: 15, question: "Which specific diagnostic test allows the physician to directly inspect the inside of the prostate and urethra using a tiny camera?", options:["Cystoscopy", "Transabdominal ultrasound", "Magnetic resonance imaging", "Retrograde pyelogram"], correct: 0, rationale: "In a cystoscopy, the physician inserts a thin tube with a tiny camera through the urethra to visually inspect the inside of the prostate and bladder." },
                { id: 16, question: "A transrectal ultrasound is frequently utilized by physicians to accurately measure the prostate size and precisely guide which secondary procedure?", options:["Biopsy needle insertion", "Catheter balloon inflation", "Laser tissue vaporization", "Alpha blocker administration"], correct: 0, rationale: "A transrectal ultrasound is used to acquire images of the prostate and to strictly guide a biopsy needle into the gland for tissue examination." },
                { id: 17, question: "Which specific surgical procedure utilizes a specialized resectoscope inserted directly through the urethra to remove small pieces of prostate tissue?", options:["Transurethral resection", "Retropubic prostatectomy", "Suprapubic prostatectomy", "Perineal resection"], correct: 0, rationale: "In the transurethral resection of the prostate, a resectoscope is inserted directly into the urethra to precisely remove small pieces of prostate tissue." },
                { id: 18, question: "A suprapubic resection explicitly involves making an abdominal incision and removing the prostate gland directly through which anatomical structure?", options:["The bladder", "The prostate capsule", "The perineal membrane", "The scrotal sac"], correct: 0, rationale: "An open suprapubic resection explicitly involves creating a major abdominal incision and subsequently removing the prostatic gland completely through the bladder." },
                { id: 19, question: "Which specific surgical approach involves making a direct incision explicitly between the scrotum and the anus to remove the prostate gland?", options:["Perineal resection", "Retropubic resection", "Suprapubic resection", "Transurethral resection"], correct: 0, rationale: "Perineal resection involves making a precise incision directly between the scrotum and the anus to access and remove the prostate gland." },
                { id: 20, question: "Which of the following is a widely recognized and frequently encountered complication occurring directly after invasive prostate surgery?", options:["Retrograde ejaculation", "Chronic renal failure", "Testicular malignancy", "Sudden cardiac arrest"], correct: 0, rationale: "Complications frequently associated with invasive prostate surgery include clot formation, incontinence, erectile dysfunction, and retrograde ejaculation." },
                { id: 21, question: "Following prostate surgery what is the primary therapeutic rationale for maintaining continuous bladder irrigation in the early postoperative period?", options:["Flushing the bladder of blood clots and debris", "Delivering localized broad spectrum antibiotics", "Preventing the development of bladder spasms", "Rapidly rehydrating the systemic circulation"], correct: 0, rationale: "The single most critical objective of continuous bladder irrigation postoperatively is to flush the bladder of blood clots and heavy debris to maintain full catheter patency." },
                { id: 22, question: "After the removal of a postoperative urinary catheter patients are strictly advised to limit their fluid intake during which specific time of day?", options:["In the evening", "In the early morning", "Immediately after meals", "Directly before physical therapy"], correct: 0, rationale: "Patients are advised to limit fluids in the evening, once the catheter is removed, to decrease the need to void and interrupt sleep during the night." },
                { id: 23, question: "During the advanced instructions for Kegel exercises the patient is specifically directed to sit on the toilet and perform which precise action?", options:["Stop the flow of urine", "Strain continuously", "Empty the bladder rapidly", "Perform a heavy cough"], correct: 0, rationale: "Advanced Kegel instructions dictate that the patient should sit on the toilet, begin to urinate, and intentionally stop the flow of urine to exercise the pelvic floor." },
                { id: 24, question: "Following the removal of a postoperative urinary catheter measuring the residual volume via ultrasound is critical if it exceeds what specific threshold?", options:["Fifty milliliters", "Ten milliliters", "One hundred milliliters", "Two hundred milliliters"], correct: 0, rationale: "Measuring residual volumes is essential; residuals of more than 50 mL strongly suggest the need for the continuation of catheterization until bladder tone improves." },
                { id: 25, question: "Dribbling of urine is considered a completely abnormal finding after catheter removal and typically indicates severe permanent surgical nerve damage.", options:["True", "False"], correct: 1, rationale: "Nurses must actively advise the patient that dribbling is completely expected after catheter removal and should steadily resolve as recuperation naturally progresses." }

            instruments: [
                { id: 1, question: "Which specific function is uniquely provided by the third lumen of a three-way Foley catheter?", options:["Balloon inflation mechanism", "Continuous bladder irrigation", "Direct urine drainage", "Core temperature measurement"], correct: 1, rationale: "A three-way Foley catheter features one lumen for balloon inflation, one for standard urine drainage, and a third explicitly designed for bladder irrigation." },
                { id: 2, question: "During a cystoscopy procedure, a female patient is typically placed on her back with her knees elevated and spread apart.", options:["True", "False"], correct: 0, rationale: "During a cystoscopy, a woman typically lies on her back with her knees up and spread apart, whereas a man can lie on his back or sit." },
                { id: 3, question: "How does the structural design of a solid cylindrical sound differ specifically when intended for a male patient compared to a female patient?", options:["It features a sweeping curve", "It has a pliable soft shaft", "It terminates in a woven tip", "It is short and completely straight"], correct: 0, rationale: "Stainless steel sounds designed for males feature a sweeping curve with a round end, whereas those for females are short and straight." },
                { id: 4, question: "At what specific capacity level should a patient routinely empty their indwelling urinary catheter collection bag?", options:["When it is one quarter full", "When it is one third full", "When it is exactly half full", "When it is completely full"], correct: 2, rationale: "Patients are advised to empty their urine collection bag regularly, specifically whenever it is half full and right before bedtime." },
                { id: 5, question: "The integrated temperature sensor located near the tip of a specialized silicone catheter is primarily designed to measure which parameter?", options:["Renal artery blood flow", "Local urethral friction", "Deep body core temperature", "Bladder wall thickness"], correct: 2, rationale: "A specialized silicone catheter equipped with an integrated temperature sensor near the tip is an appropriate means of determining deep body or core temperature." },
                { id: 6, question: "According to standardized clinical guidelines, short term catheterization involves leaving the catheter in the bladder for a maximum of what duration?", options:["Up to twenty four hours", "Up to exactly one week", "Up to exactly four weeks", "Up to exactly six months"], correct: 1, rationale: "Short term catheterization is clinically defined as leaving the catheter in the bladder for up to one week, often in preoperative and postoperative settings." },
                { id: 7, question: "Foley urethral catheters in male patients should be securely fixed using adhesive tape placed directly on the inner thigh.", options: ["True", "False"], correct: 1, rationale: "Foley urethral catheters should be securely fixed by adhesive tape to the lower abdomen in male patients and to the thigh in female patients." },
                { id: 8, question: "For the specific purpose of collecting urine specimens before a cystoscopy, fluids should be forced to at least what volume?", options:["Two hundred cubic centimeters", "Four hundred cubic centimeters", "Six hundred cubic centimeters", "Eight hundred cubic centimeters"], correct: 1, rationale: "If urine specimens must be collected, fluids are forced for several hours before the patient undergoes cystoscopy, requiring at least four hundred cubic centimeters." },
                { id: 9, question: "What is the leading healthcare-associated complication directly resulting from the use of indwelling urinary catheters?", options:["Severe bladder rupture", "Urinary tract infections", "Chronic kidney disease", "Acute urethral stricture"], correct: 1, rationale: "Indwelling urinary catheters are recognized as the leading cause of healthcare-associated urinary tract infections." },
                { id: 10, question: "Which urological instrument is characterized by a big tail and a woven tip that ends with a screw for attaching subsequent instruments?", options:["Flexible optical cystoscope", "Stainless steel sound", "Filiform and followers", "Pliable olive bougie"], correct: 2, rationale: "The filiform and followers instrument features a fine profile with a big tail and a woven tip that ends with a screw to allow the attachment of subsequent instruments." },
                { id: 11, question: "How frequently should a newly inserted catheter initially be checked for patency before transitioning to standard routine checks?", options: ["Every five minutes", "Every fifteen minutes", "Every thirty minutes", "Every sixty minutes"], correct: 1, rationale: "A newly inserted catheter must be checked for patency every fifteen minutes at the beginning until flow is established, and then every six hours." },
                { id: 12, question: "It is considered clinically abnormal to observe hematuria immediately following the successful insertion of a urinary catheter.", options: ["True", "False"], correct: 1, rationale: "The text explicitly states that it is normal if hematuria presents immediately after catheterization, though a doctor should be notified if it increases." },
                { id: 13, question: "Which of the following medical interventions represents a strictly therapeutic indication for performing a cystoscopy?", options:["Investigating recurrent urinary infections", "Determining the cause of severe urgency", "Removing a previously placed ureteral stent", "Obtaining tissue biopsies for cellular examination"], correct: 2, rationale: "Removing a stent that was placed in the ureter after a ureteroscopy is classified strictly as a therapeutic indication for a cystoscopy." },
                { id: 14, question: "Which specific material is highly recommended for manufacturing catheters intended for long-term continuous patient use?", options:["Natural latex rubber", "Pure silicone material", "Hardened plastic resin", "Braided polyurethane"], correct: 1, rationale: "One hundred percent silicone catheters are specifically recommended for long-term catheterization lasting between six weeks and three months." },
                { id: 15, question: "What physical characteristics accurately describe urological bougies compared to standard metallic sounds?", options:["They are rigid and sharply pointed", "They are pliable and soft dilators", "They are hollow and easily inflated", "They are brittle and highly textured"], correct: 1, rationale: "Unlike rigid solid stainless steel sounds, bougies are more pliable and are soft dilators typically shaped like an olive or corn." },
                { id: 16, question: "If general anesthesia is utilized for a scheduled cystoscopy, the patient must completely fast for a minimum of how many hours prior to the test?", options:["Four hours", "Six hours", "Eight hours", "Twelve hours"], correct: 2, rationale: "If general anesthesia is required for the procedure, the patient should fast for at least eight hours prior to the scheduled cystoscopy test." },
                { id: 17, question: "Saline is routinely injected through the cystoscope to slowly fill and stretch the bladder wall for better internal visualization.", options:["True", "False"], correct: 0, rationale: "After administering anesthesia, saline is injected directly through the cystoscope to slowly fill and stretch the bladder, providing the urologist with a better internal view." },
                { id: 18, question: "What is the standard volume range of sterile water required to properly inflate the balloon of a standard two-way Foley catheter?", options:["Five to ten milliliters", "Ten to twenty milliliters", "Twenty to thirty milliliters", "Thirty to forty milliliters"], correct: 1, rationale: "A standard two-way Foley catheter utilizes a specialized balloon that is inflated after successful insertion using ten to twenty milliliters of sterile water." },
                { id: 19, question: "By what specific mechanical method are cystostomy and nephrostomy tubes securely fixed directly to the patient's body?", options:["Medical surgical sutures", "Medical adhesive tape", "Elastic retention wraps", "Inflatable balloon mechanisms"], correct: 0, rationale: "While Foley catheters are secured with adhesive tape, surgical cystostomy and nephrostomy tubes must be securely fixed to the patient using medical sutures." },
                { id: 20, question: "A one-way non-retaining catheter is most frequently selected to perform which specific clinical task?", options:["Continuous bladder irrigation", "Intermittent urinary drainage", "Postoperative blood clot removal", "Long term urine collection"], correct: 1, rationale: "A one-way or straight catheter has only a single channel without a balloon and is routinely used for intermittent catheterization or single urine drainage." },
                { id: 21, question: "Following a routine cystoscopy procedure, expected localized discomfort and mild hematuria should typically resolve completely within what timeframe?", options:["Twelve consecutive hours", "Twenty four consecutive hours", "Forty eight consecutive hours", "Seventy two consecutive hours"], correct: 1, rationale: "Mild burning, small amounts of blood, discomfort, and urinary frequency are expected after a cystoscopy but should not last more than twenty four hours." },
                { id: 22, question: "Unless medically contraindicated, a patient with an indwelling urinary catheter should be strongly encouraged to maintain what daily fluid intake?", options:["Up to one liter", "Up to two liters", "Up to three liters", "Up to four liters"], correct: 2, rationale: "To decrease the risk of infection, patients with indwelling catheters should be encouraged to increase fluid intake up to three liters per day unless contraindicated." },
                { id: 23, question: "A patient scheduled for a cystoscopy utilizing solely local anesthesia is strictly required to fast from food and liquids prior to the procedure.", options:["True", "False"], correct: 1, rationale: "If only a local anesthetic is utilized for the cystoscopy procedure, the patient is safely permitted to eat and drink normally before the test." },
                { id: 24, question: "What specific volume of extra fluid is generally recommended for a patient to consume to aid recovery immediately after a cystoscopy?", options:["Approximately one liter", "Approximately two liters", "Approximately three liters", "Approximately four liters"], correct: 2, rationale: "Healthcare providers routinely recommend drinking approximately three liters of extra fluid after the cystoscopy to assist in recovery and minimize discomfort." },
                { id: 25, question: "Preoperative insertion of a urinary catheter is strictly indicated for patients expected to receive which type of therapy during their surgery?", options:["Intravenous broad spectrum antibiotics", "Inhaled general anesthetic gases", "Large volume infusions or diuretics", "Localized tissue radiation therapy"], correct: 2, rationale: "Preoperative catheter insertion is specifically indicated for patients anticipated to receive large volume intravenous infusions or diuretic medications during surgery." },
                { id: 26, question: "Retrograde pyelography performed during a cystoscopy utilizes a contrast medium injected into the ureter specifically to detect what condition?", options:["Urinary tract infections", "Causes of internal obstruction", "Bladder muscle hypertrophy", "Uncontrolled systemic bleeding"], correct: 1, rationale: "Retrograde pyelography involves injecting a contrast medium into the ureter to create images of urinary flow and precisely identify causes of obstruction." },
                { id: 27, question: "How frequently should the external anatomical area directly surrounding an indwelling urinary catheter be routinely cleaned with water?", options:["Once a day", "Twice a day", "Three times a day", "Four times a day"], correct: 1, rationale: "Proper catheter care requires cleaning the external area surrounding the catheter exactly twice a day using water and drying it with a clean towel." },
                { id: 28, question: "Which of the following instruments is correctly classified as a urological scope based entirely on its structural design rather than insertion site?", options:["Nephroscope instrument", "Ureteroscope instrument", "Cystoscope instrument", "Resectoscope instrument"], correct: 3, rationale: "Resectoscopes, urethrotomes, and lithotrites are explicitly classified as types of urological scopes based entirely on their unique physical structures rather than insertion sites." },
                { id: 29, question: "What is the primary functional purpose of solid urological dilators such as sounds and bougies when passed into the genitourinary tract?", options:["Stretching the urethral lumen", "Measuring local urine output", "Irrigating the bladder cavity", "Inflating an internal balloon"], correct: 0, rationale: "Urological dilators are solid instruments primarily passed through the tract for stretching the lumen of the urethra or ureter." },
                { id: 30, question: "Long term catheterization involves intentionally leaving the indwelling device securely within the bladder for what specified duration?", options:["One to two consecutive weeks", "Three to four consecutive weeks", "Six weeks to three months", "Four months to six months"], correct: 2, rationale: "Long term catheterization is clinically categorized as maintaining the catheter safely within the patient's bladder for a duration of six weeks to three months." }

                { id: 4, question: "Which urodynamic procedure specifically requires the patient to arrive with a strong urge to void in order to accurately measure the volume of released urine over time?", options:["Cystometrography measurement", "Uroflowmetry evaluation", "Electromyography assessment", "Voiding cystourethrography"], correct: 1, rationale: "Uroflowmetry relies entirely on measuring the volume and flow rate of voided urine, thus requiring the patient to present with a strong urge to void." },

                { id: 6, question: "Patients with implanted cardiac pacemakers or metallic orthopedic devices are strictly contraindicated from undergoing magnetic resonance imaging.", options: ["True", "False"], correct: 0, rationale: "Because magnetic resonance imaging uses a powerful magnetic field, patients with pacemakers, metallic orthopedic devices, or aneurysm clips are strictly contraindicated from having the test." },
                { id: 7, question: "During a computed tomography scan of the urinary tract, which specific action must the patient maintain to prevent severe image distortion?", options: ["Breathing deeply", "Remaining motionless", "Voiding continuously", "Drinking fluids"], correct: 1, rationale: "The nurse must instruct the patient not to talk or move their body during the CT scan because any motion will distort the cross sectional images." },
                { id: 8, question: "Which clinical condition typically causes a measurable decrease in the specific gravity of a urine specimen?", options: ["Diabetes mellitus", "Severe dehydration", "Diabetes insipidus", "Extreme fever"], correct: 2, rationale: "Urine specific gravity is noticeably decreased in cases of diabetes insipidus and increased fluid intake, while it increases in diabetes mellitus and dehydration." },
                { id: 9, question: "The presence of urinary casts in a microscopic examination primarily indicates a disease process occurring in which specific physiological area?", options:["Renal mucosal lining", "Proximal convoluted tubules", "Distal tubules and collecting ducts", "Glomerular capillary networks"], correct: 2, rationale: "Casts result directly from the agglutination of cells and precipitation of proteins present in the distal tubules and the collecting ducts of the kidney." },
                { id: 10, question: "A strongly sweet or fruity odor in a collected urine specimen most commonly indicates the abnormal presence of which component?", options:["Bacterial infection", "Ketone bodies", "Excessive mucus", "Red blood cells"], correct: 1, rationale: "A sweet or fruity smelling urine indicates the presence of ketone bodies, a condition known as ketonuria, which often results from the breakdown of fats." },
                { id: 11, question: "The normal physiological pH range for human urine typically falls strictly between four point five and eight point zero.", options:["True", "False"], correct: 0, rationale: "The healthy kidney maintains a normal pH range for urine that spans from 4.5 to 8.0." },
                { id: 12, question: "Following a renal angiography, cold compresses are typically applied to the injection site for what specific therapeutic purpose?", options:["To prevent systemic fever", "To increase blood circulation", "To decrease localized edema", "To stimulate nerve regeneration"], correct: 2, rationale: "Cold compresses may be directly applied to the injection or puncture site post-procedure to significantly decrease localized edema and pain." },

                { id: 14, question: "Which ultrasound procedure is considered a reliable noninvasive method specifically utilized to measure post voiding residual urine volume?", options:["Voiding cystourethrography", "Bladder ultrasonography", "Retrograde pyelography", "Infusion drip pyelography"], correct: 1, rationale: "Bladder ultrasonography is a specialized noninvasive method designed for measuring urine volume in the bladder, particularly the post-voiding residual urine volume." },
                { id: 15, question: "The normal physiological range for urine osmolality measured over a complete twenty four hour period is established at which specific values?", options:["One hundred to three hundred milliosmoles", "Three hundred to nine hundred milliosmoles", "Nine hundred to twelve hundred milliosmoles", "Twelve hundred to fifteen hundred milliosmoles"], correct: 1, rationale: "The normal value for urine osmolality, which tests the renal concentration ability, ranges from 300 to 900 mosm/kg/24hrs." },
                { id: 16, question: "During a retrograde pyelography procedure, the introduced contrast agent flows in the exact same direction as the normal outbound flow of urine.", options: ["True", "False"], correct: 1, rationale: "In retrograde pyelography, the contrast agent is introduced upward through a catheter, meaning its flow is entirely opposite to the usual outbound flow of urine." },

        // --- APP LOGIC ---
        let currentQuizData = [];
        const container = document.getElementById('quiz-container');
        let score = 0; 
        let answeredCount = 0;

        function startQuiz(quizKey, quizTitle) {
            // Update UI to show quiz
            document.getElementById('home-menu').style.display = 'none';
            document.getElementById('back-btn').classList.remove('hidden-content');
            document.getElementById('main-title').innerText = quizTitle;
            document.getElementById('sub-title').style.display = 'none';
            
            // Get raw data and shuffle options
            const rawData = allQuizzesData[quizKey];
            currentQuizData = rawData.map(q => {
                const opts = q.options.map((text, i) => ({ text, isCorrect: i === q.correct }));
                // Shuffle options
                for (let i = opts.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [opts[i], opts[j]] = [opts[j], opts[i]];
                }
                return { ...q, options: opts.map(o => o.text), correct: opts.findIndex(o => o.isCorrect) };
            });
            
            score = 0;
            answeredCount = 0;
            container.style.display = 'block';
            document.getElementById('result-summary').classList.add('hidden-content');
            renderQuiz();
        }

        function returnToMenu() {
            // Restore UI to Main Menu
            document.getElementById('home-menu').style.display = 'block';
            document.getElementById('back-btn').classList.add('hidden-content');
            document.getElementById('main-title').innerText = "الموسوعة الشاملة - جراحة المسالك البولية";
            document.getElementById('sub-title').style.display = 'block';
            container.style.display = 'none';
            document.getElementById('result-summary').classList.add('hidden-content');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderQuiz() {
            container.innerHTML = '';
            const totalDisplay = document.getElementById('total-display');
            if(totalDisplay) totalDisplay.innerText = `/ ${currentQuizData.length}`;
            
            container.innerHTML = currentQuizData.map((q, index) => {
                return `
                <div class="card bg-white rounded-xl p-6 mb-6 border border-gray-100 shadow-sm">
                    <div class="flex justify-between items-center mb-4 border-b border-gray-50 pb-3">
                        <span class="bg-blue-100 text-blue-800 text-xs font-bold px-3 py-1 rounded-full">Question ${index + 1}</span>
                         ${q.options.length === 2 ? '<span class="bg-purple-100 text-purple-800 text-xs font-bold px-2 py-1 rounded-md">True/False</span>' : ''}
                    </div>
                    <h3 class="text-gray-800 font-bold mb-6 text-lg leading-relaxed font-sans" style="direction: ltr; text-align: left;">${q.question}</h3>
                    <div class="grid gap-3 ${q.options.length === 2 ? 'grid-cols-2' : ''}">
                        ${q.options.map((opt, i) => `<button onclick="checkAnswer(${index}, ${i})" class="option-btn option-btn-${index} w-full text-left px-5 py-4 rounded-xl border border-gray-200 hover:bg-blue-50 hover:border-blue-300 focus:outline-none flex items-center justify-between group bg-white"><span class="font-medium text-gray-700 group-hover:text-blue-700 font-sans">${opt}</span></button>`).join('')}
                    </div>
                    <div id="feedback-${index}" class="hidden-content mt-6 bg-blue-50 rounded-xl p-5 border border-blue-100 animate-fade-in text-left">
                        <p class="text-blue-800 text-sm leading-relaxed font-sans"><strong>Rationale:</strong> ${q.rationale}</p>
                    </div>
                </div>`;
            }).join('');
        }

        window.checkAnswer = function(qIndex, optIndex) {
            const q = currentQuizData[qIndex];
            const feedback = document.getElementById(`feedback-${qIndex}`);
            const btns = document.querySelectorAll(`.option-btn-${qIndex}`);
            if (!feedback.classList.contains('hidden-content')) return;
            
            feedback.classList.remove('hidden-content');
            btns.forEach((btn, i) => {
                btn.disabled = true;
                if (i === q.correct) { 
                    btn.classList.add('correct-answer'); 
                    btn.innerHTML += '<i class="fas fa-check float-right"></i>'; 
                }
                else if (i === optIndex) { 
                    btn.classList.add('wrong-answer'); 
                    btn.innerHTML += '<i class="fas fa-times float-right"></i>'; 
                }
                else { 
                    btn.classList.add('opacity-50'); 
                }
            });
            
            if (optIndex === q.correct) score++;
            answeredCount++;
            
            if (answeredCount === currentQuizData.length) {
                document.getElementById('result-summary').classList.remove('hidden-content');
                document.getElementById('score-display').innerText = score;
                document.getElementById('score-message').innerText = (score/currentQuizData.length*100) >= 50 ? "Good Job! Keep it up." : "Keep Studying, you can do better!";
                setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }), 500);
            }
        };
    </script>
</body>
</html>
